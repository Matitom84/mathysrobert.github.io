 <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#0a0a0a"/>
  
  <g transform="translate(100, 100)">
    <!-- Bouclier principal -->
    <path d="M0,-80 L52,-57 L52,11 Q52,57 0,80 Q-52,57 -52,11 L-52,-57 Z"
      fill="#0a0a0a" stroke="#FFD600" stroke-width="2.5"/>

    <!-- Bouclier intérieur -->
    <path d="M0,-66 L42,-47 L42,10 Q42,48 0,66 Q-42,48 -42,10 L-42,-47 Z"
      fill="none" stroke="rgba(255,214,0,0.25)" stroke-width="1"/>

    <!-- Ligne décorative haute -->
    <line x1="-32" y1="-34" x2="32" y2="-34" stroke="#FFD600" stroke-width="0.8" opacity="0.5"/>

    <!-- Lettres MR -->
    <text x="-16" y="10" font-family="monospace" font-size="34" font-weight="700"
      fill="#FFD600" text-anchor="middle">M</text>
    <text x="17" y="10" font-family="monospace" font-size="34" font-weight="700"
      fill="#f5f5f0" text-anchor="middle">R</text>

    <!-- Ligne décorative basse -->
    <line x1="-24" y1="22" x2="24" y2="22" stroke="#FFD600" stroke-width="0.8" opacity="0.5"/>

    <!-- Point déco bas -->
    <circle cx="0" cy="30" r="2" fill="#FFD600" opacity="0.6"/>

    <!-- Petits points déco coins -->
    <circle cx="-42" cy="-47" r="2" fill="#FFD600" opacity="0.5"/>
    <circle cx="42" cy="-47" r="2" fill="#FFD600" opacity="0.5"/>
  </g>
</svg>