<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
 
  <!-- Lettre M jaune -->
  <text x="20" y="145" font-family="monospace" font-size="130" font-weight="700"
    fill="#FFD600">M</text>
 
  <!-- Lettre R blanche, décalée pour se superposer légèrement -->
  <text x="90" y="145" font-family="monospace" font-size="130" font-weight="700"
    fill="#ffffff">R</text>
 
  <!-- Petite ligne déco en bas -->
  <line x1="20" y1="160" x2="180" y2="160" stroke="#FFD600" stroke-width="4"/>
 
</svg>
 
